<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BusyLight</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BusyLight">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      --bg:         #111827;
      --surface:    #1f2937;
      --surface2:   #374151;
      --text:       #f9fafb;
      --text-muted: #9ca3af;
      --accent:     #3b82f6;
      --danger:     #ef4444;
      --success:    #22c55e;
      --radius:     12px;
      --gap:        16px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding:
        calc(env(safe-area-inset-top,  0px) + 16px)
        16px
        calc(env(safe-area-inset-bottom, 0px) + 16px);
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 4px;
    }

    header img { width: 36px; height: 36px; }
    h1         { font-size: 22px; font-weight: 700; }

    /* ── Status bar ────────────────────────────────────── */
    .status-bar {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status-indicator { display: flex; align-items: center; gap: 10px; }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected  { background: var(--success); }
    .dot.connecting { background: #f59e0b; animation: blink 1s infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    #statusText             { font-size: 14px; color: var(--text-muted); transition: color 0.3s; }
    #statusText.connected   { color: var(--text); }

    /* ── Buttons ───────────────────────────────────────── */
    .btn {
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      padding: 14px 20px;
      min-height: 50px;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      text-align: center;
    }
    .btn:active    { transform: scale(0.97); }
    .btn:disabled  { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-danger    { background: var(--danger);  color: #fff; }

    #connectBtn {
      flex-shrink: 0;
      width: auto;
      padding: 10px 16px;
      font-size: 14px;
      min-height: 40px;
      border-radius: 8px;
    }

    /* ── Section ───────────────────────────────────────── */
    .section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: var(--gap);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
    }

    /* ── Preset grid ───────────────────────────────────── */
    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .preset-btn {
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 14px 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-height: 80px;
      transition: opacity 0.15s, transform 0.1s, border-color 0.2s;
      color: #fff;
    }
    .preset-btn:active   { transform: scale(0.94); }
    .preset-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .preset-btn.active   { border-color: rgba(255,255,255,0.6); }

    .preset-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
    }

    /* ── Form controls ─────────────────────────────────── */
    .form-row { display: flex; flex-direction: column; gap: 8px; }

    .form-label {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-label .value { color: var(--text); font-weight: 500; }

    input[type="color"] {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--surface2);
      padding: 4px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface2);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ── Mode selector ─────────────────────────────────── */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .mode-btn {
      border: 2px solid var(--surface2);
      border-radius: 8px;
      padding: 10px 4px;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      min-height: 44px;
      line-height: 1.3;
    }

    .mode-btn.selected {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.15);
      color: var(--text);
    }

    /* ── Toast ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(72px);
      background: var(--surface2);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    #toast.show        { transform: translateX(-50%) translateY(0); }
    #toast.toast-error { background: var(--danger); }

    /* ── BLE unavailable notice ────────────────────────── */
    #bleNotice {
      display: none;
      background: #78350f;
      border: 1px solid #f59e0b;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <header>
    <img src="icon.svg" alt="BusyLight Icon">
    <h1>BusyLight</h1>
  </header>

  <!-- Web Bluetooth not available -->
  <div id="bleNotice">
    Web Bluetooth wird in diesem Browser nicht unterstützt.<br>
    Bitte öffne diese Seite in <strong>Bluefy</strong> (iOS) oder Chrome (Android/Desktop).
  </div>

  <!-- Connection status -->
  <div class="status-bar">
    <div class="status-indicator">
      <div class="dot" id="dot"></div>
      <span id="statusText">Nicht verbunden</span>
    </div>
    <button class="btn btn-primary" id="connectBtn">Verbinden</button>
  </div>

  <!-- Quick presets -->
  <div class="section">
    <div class="section-title">Schnellwahl</div>
    <div class="preset-grid" id="presetGrid"></div>
  </div>

  <!-- Manual controls -->
  <div class="section">
    <div class="section-title">Manuell</div>

    <div class="form-row">
      <div class="form-label">Farbe</div>
      <input type="color" id="colorPicker" value="#00c800">
    </div>

    <div class="form-row">
      <div class="form-label">
        Helligkeit
        <span class="value" id="brightnessVal"></span>
      </div>
      <input type="range" id="brightness" min="0" max="255" value="153">
    </div>

    <div class="form-row">
      <div class="form-label">Modus</div>
      <div class="mode-grid" id="modeGrid"></div>
    </div>

    <div class="form-row">
      <div class="form-label">
        Geschwindigkeit
        <span class="value" id="speedVal"></span>
      </div>
      <input type="range" id="speed" min="0" max="255" value="128">
    </div>

    <button class="btn btn-primary" id="sendBtn" disabled>Senden</button>
  </div>

  <div id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
