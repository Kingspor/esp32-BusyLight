name: Release

# Trigger: push a tag like v1.0.0 or v0.3.1
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Job 1: Build Windows app ────────────────────────────────────────────────
  build-app:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish single-file executable
        shell: bash
        run: |
          dotnet publish app/BusyLight/BusyLight.csproj \
            -p:PublishProfile=Release-win-x64 \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app/BusyLight/bin/Release/publish/BusyLight.exe

  # ─── Job 2: Build ESP32-C3 firmware ──────────────────────────────────────────
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Configure arduino-cli and install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install firmware libraries
        run: |
          arduino-cli lib install "Adafruit NeoPixel"

      - name: Compile firmware
        run: |
          mkdir -p firmware/build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3 \
            --output-dir firmware/build \
            firmware/BusyLight

      - name: Rename firmware binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv firmware/build/BusyLight.ino.bin "firmware/build/BusyLight-firmware-${VERSION}.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/build/BusyLight-firmware-*.bin

  # ─── Job 3: Create GitHub Release ────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-app, build-firmware]

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: dist/

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/BusyLight.exe
            dist/BusyLight-firmware-*.bin
