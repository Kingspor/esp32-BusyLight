name: Release

# Trigger: push a tag like v1.0.0 or v0.3.1
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Strip the leading 'v' from the tag (v1.2.3 → 1.2.3)
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish single-file executable
        shell: bash
        run: |
          dotnet publish app/BusyLight/BusyLight.csproj \
            -p:PublishProfile=Release-win-x64 \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from commit messages since last tag
          generate_release_notes: true
          files: app/BusyLight/bin/Release/publish/BusyLight.exe
